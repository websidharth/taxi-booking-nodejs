<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f7fb;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 24px;
        }

        .header {
            text-align: center;
            padding: 16px 0;
            color: #333;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px;
        }

        .greeting {
            font-size: 16px;
            color: #444;
        }

        .content {
            margin-top: 16px;
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 10px 16px;
            background: #2b6cb0;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2 class="title">Hello {{name}}</h2>
        </div>
        <div class="content">
            <p>Please verify your email by clicking the link below:</p>
            <p><a class="btn" href="{{verifyUrl}}">Verify Email</a></p>
            <p>This link will expire in 15 minutes.</p>
        </div>
        <div class="footer">
            <p>Sent with ❤️ by Newsletter Platform</p>
        </div>
    </div>
</body>

</html>
